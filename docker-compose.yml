services:

  db:
    # timescaledb-ha incluye TimescaleDB + PostGIS de fábrica
    image: timescale/timescaledb-ha:pg15
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Script que crea las extensiones la primera vez
      - ./infra/docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  cerebrovial:
    build:
      context: ./CerebroVial
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Opcional: recargar código en desarrollo (requiere montar el volumen)
    # volumes:
    #   - ./CerebroVial:/app

volumes:
  db_data:
