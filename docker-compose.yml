services:

  # ------------------------------------
  # DOMINIO DE DATOS
  # ------------------------------------
  db_postgres:
    image: timescale/timescaledb-ha:pg15
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cerebrovial}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  db_mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 512M

  # ------------------------------------
  # DOMINIO DE LÓGICA DE NEGOCIO
  # ------------------------------------
  api_gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    # volumes:
    #  - ./api_gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core_management_api
    deploy:
      resources:
        limits:
          memory: 128M

  core_management_api:
    build:
      context: .
      dockerfile: core_management_api/Dockerfile
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      db_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ------------------------------------
  # DOMINIO EDGE
  # ------------------------------------
  edge_device:
    build:
      context: .
      dockerfile: edge_device/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db_postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  db_data:
  mongo_data:
