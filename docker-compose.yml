services:

  # ------------------------------------
  # DOMINIO DE DATOS
  # ------------------------------------
  db:
    image: timescale/timescaledb-ha:pg15
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cerebrovial}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ------------------------------------
  # DOMINIO DE LÓGICA DE NEGOCIO
  # ------------------------------------
  core_management_api:
    build:
      context: .
      dockerfile: core_management_api/Dockerfile
    env_file: .env
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M

  # ------------------------------------
  # DOMINIO EDGE
  # ------------------------------------
  edge_device:
    build:
      context: .
      dockerfile: edge_device/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

volumes:
  db_data:
